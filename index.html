
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Blog de Tecnologia</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background:#0d1117;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    display:block;
}

.card-content{
    padding:20px;
}

button{
    background:#238636;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}
</style>

</head>
<body>

<header>
    <h1>💻 Meu Blog de Tecnologia</h1>
    <p>Programação • HTML • CSS • JavaScript</p>
</header>

<div class="container">

    <div class="card">

        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200" alt="Computador">

        <div class="card-content">
            <h2>Bem-vindo ao meu blog!</h2>

            <p>
                Aqui você encontra tutoriais sobre programação,
                desenvolvimento web, inteligência artificial e novidades
                do mundo da tecnologia.
            </p>

            <button>Ler Artigos</button>

        </div>

    </div>

</div>

</body>
</html>
